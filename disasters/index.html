<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Disasters — Supm3n</title>

    <!-- Shared theme (served from supm3n.com/shared). 
         NOTE: If filenames differ, update the href/src to your actual shared assets.
         Best practice: deploy landingpage first to update shared assets, then this project. -->
    <link rel="preconnect" href="https://supm3n.com" crossorigin>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

    <!-- Attempt to load shared CSS from your main site.
         Replace 'site.css' with your real shared css file if different. -->
    <link rel="stylesheet" href="https://supm3n.com/shared/site.css?v=20251112">
    <link rel="stylesheet" href="./styles.css?v=20251112">
  </head>
  <body>
    <!-- Shared header/menu: your shared JS usually injects this. If your site uses a custom init function,
         call it after the script loads at the bottom. This keeps the look consistent with other projects. -->
    <header id="site-header"></header>

    <main class="page page--disasters">
      <section class="hero">
        <h1 class="page-title">Disaster Explorer</h1>
        <p class="page-subtitle">Map of recent earthquakes and wildfires — minimal MVP</p>
      </section>

      <section class="controls">
        <div class="controls__row">
          <div class="search">
            <input id="searchBox" type="search" placeholder="Search place, hazard (e.g., 'earthquake'), or 'M≥5 last 24h'…" />
            <button id="searchBtn" class="btn">Search</button>
          </div>
          <div class="chips">
            <label><input type="checkbox" class="chip" value="eq" checked> Earthquakes</label>
            <label><input type="checkbox" class="chip" value="wf" checked> Wildfires</label>
          </div>
          <div class="sort">
            <label for="sortSelect" class="sr-only">Sort</label>
            <select id="sortSelect" title="Sort events">
              <option value="recent" selected>Most recent</option>
              <option value="severe">Most severe</option>
            </select>
          </div>
          <div class="toggle">
            <label title="Show only official/scientific sources"><input type="checkbox" id="officialOnly"> Official sources only</label>
          </div>
        </div>
        <div class="status">
          <span id="statusText">Loading…</span>
          <span id="staleBadge" class="badge badge--hidden">Feed stale</span>
        </div>
      </section>

      <section class="content">
        <div id="map"></div>
        <aside id="list" aria-label="Events list"></aside>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <!-- Libs -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Shared JS: if you have a shared initializer (e.g., window.supm3nInit), call it in app.js.
         Replace 'site.js' with your real shared js if different. -->
    <script type="module" src="https://supm3n.com/shared/site.js?v=20251112"></script>

    <!-- App -->
    <script type="module" src="./app.js?v=20251112"></script>
  </body>
</html>
