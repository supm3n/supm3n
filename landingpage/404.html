<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page Not Found</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  
  <link rel="icon" href="/assets/icons/favicon.ico">
  
  <!-- Theme system -->
  <link rel="stylesheet" href="/shared/styles/variables.css?v=20251110d">
  <link rel="stylesheet" href="/shared/styles/components.css?v=20251110d">
  <script type="module" src="/shared/scripts/theme.js?v=20251110d"></script>
  
  <link rel="stylesheet" href="/assets/styles.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
</head>
<body>
  <!-- Placeholder for shared site header -->
  <header class="site-header"></header>

  <script src="/shared/scripts/components.js?v=20251110d" defer></script>

  <main id="main-content" role="main">
    <section class="projects-section" style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
      <div class="container">
        <div class="text-center">
          <h1 style="font-size: var(--text-4xl); margin-bottom: var(--space-md);">404</h1>
          <p style="font-size: var(--text-xl); color: var(--color-text-muted); margin-bottom: var(--space-xl);">
            The page you're looking for doesn't exist.
          </p>
          <a href="/" class="btn btn-primary">Go Home</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <div class="footer-links">
        <a href="/uses">Uses</a>
        <!-- <a href="/now">Now</a> -->
        <!-- <a href="/contact">Contact</a> -->
        <a href="/privacy">Privacy</a>
      </div>
      <div class="footer-social"></div>
      <div style="font-size: var(--text-xs); color: var(--color-text-muted);">
        Last updated: <time id="last-updated"></time>
      </div>
    </div>
  </footer>

  <script src="/assets/script.js"></script>
  <script type="module">
    import { toggleTheme } from '/shared/scripts/theme.js?v=20251110d';

    async function waitForComponents(timeoutMs = 4000) {
      const start = Date.now();
      while (!window.Supm3nComponents && Date.now() - start < timeoutMs) {
        await new Promise(r => setTimeout(r, 25));
      }
      return !!window.Supm3nComponents;
    }

    if (await waitForComponents()) {
      await window.Supm3nComponents.init({
        header: true,
        footer: false,
        styles: false,
        utils: false
      });
    }

    window.Supm3nUtils?.initNavigation?.();

    (document.getElementById('theme-toggle')
      || document.getElementById('themeToggle')
      || document.querySelector('[data-theme-toggle]'))
      ?.addEventListener('click', toggleTheme);
  </script>
  <script>
    // Update last updated date
    document.addEventListener('DOMContentLoaded', () => {
      const lastUpdatedEl = document.getElementById('last-updated');
      if (lastUpdatedEl) {
        lastUpdatedEl.textContent = new Date().toLocaleDateString();
      }
    });
  </script>
</body>
</html>
