<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Playground — Supm3n</title>
  <meta name="description" content="Run Python programs interactively in your browser">
  <link rel="icon" href="/assets/icons/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0b0c10">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://supm3n.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://supm3n.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https:;">
  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Python Playground — Supm3n">
  <meta property="og:description" content="Run Python programs interactively in your browser">
  <meta property="og:image" content="/assets/icons/android-chrome-512x512.png">
  <meta property="og:url" content="https://python.supm3n.com/">
  <meta name="twitter:card" content="summary_large_image">
  <!-- Canonical URL -->
  <link rel="canonical" href="https://python.supm3n.com/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Shared Styles -->
  <link rel="stylesheet" href="https://supm3n.com/shared/styles/variables.css?v=20251108">
  <link rel="stylesheet" href="https://supm3n.com/shared/styles/components.css?v=20251108">
  
  <!-- Project-specific styles -->
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <!-- Header will be injected here -->
  <header class="site-header"></header>
  
  <!-- Breadcrumbs -->
  <nav class="breadcrumbs" id="breadcrumbs"></nav>

  <main id="main-content" class="container">
    <section class="playground-header">
      <h1>Python Playground</h1>
      <p>Run Python programs interactively in your browser. Select a program or write your own code.</p>
    </section>

    <section class="program-selector">
      <label for="program-select" class="sr-only">Select Program</label>
      <select id="program-select" class="program-select">
        <option value="">-- Select a program --</option>
        <option value="custom">Write Custom Code</option>
        <!-- Programs will be loaded dynamically -->
      </select>
      <button id="run-btn" class="btn btn-primary" disabled>Run</button>
      <button id="clear-btn" class="btn btn-secondary">Clear</button>
    </section>

    <div class="editor-container">
      <div class="editor-section">
        <div class="editor-header">
          <h2>Python Code</h2>
          <span class="status" id="status">Ready</span>
        </div>
        <textarea 
          id="code-editor" 
          class="code-editor" 
          placeholder="# Write or select a Python program here&#10;# Example:&#10;print('Hello, World!')&#10;for i in range(5):&#10;    print(f'Number: {i}')"
          spellcheck="false"
        ></textarea>
      </div>

      <div class="output-section">
        <div class="editor-header">
          <h2>Output</h2>
          <button id="clear-output-btn" class="btn-text">Clear</button>
        </div>
        <div id="output" class="output"></div>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="loading-spinner"></div>
      <p>Loading Pyodide...</p>
    </div>
  </main>

  <!-- Footer will be injected here -->
  <footer class="site-footer"></footer>
  
  <!-- Pyodide - Python in the browser -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js" defer></script>
  
  <!-- Component Loader -->
  <script src="https://supm3n.com/shared/scripts/components.js?v=20251108"></script>
  <script>
    // Initialize shared components
    document.addEventListener('DOMContentLoaded', async () => {
      await Supm3nComponents.init({
        header: true,
        footer: true,
        breadcrumbs: true,
        styles: false, // Already loaded in <head>
        utils: true
      });
    });
  </script>
  
  <script src="/assets/script.js" defer></script>
</body>
</html>
