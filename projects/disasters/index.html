<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Disaster Explorer — Supm3n</title>
  <meta name="description" content="Recent earthquakes and wildfire hotspots on a fast map.">
  <link rel="icon" href="/assets/icons/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0b0c10">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://supm3n.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://supm3n.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https:;">
  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Disaster Explorer — Supm3n">
  <meta property="og:description" content="Recent earthquakes and wildfire hotspots on a fast map.">
  <meta property="og:image" content="/assets/icons/android-chrome-512x512.png">
  <meta property="og:url" content="https://disasters.supm3n.com/">
  <meta name="twitter:card" content="summary_large_image">
  <!-- Canonical URL -->
  <link rel="canonical" href="https://disasters.supm3n.com/">
  
  <meta name="color-scheme" content="dark light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Theme system (same as stocks) -->
  <link rel="stylesheet" href="https://supm3n.com/shared/styles/variables.css?v=20251110d">
  <script type="module" src="https://supm3n.com/shared/scripts/theme.js?v=20251110d"></script>
  
  <!-- Shared Utilities -->
  <!--<script src="https://supm3n.com/shared/scripts/utils.js?v=20251110d"></script>-->
  
  
  <!-- Shared Components -->
  <link rel="stylesheet" href="https://supm3n.com/shared/styles/components.css?v=20251110d">
  
  <!-- Vendor CSS (local = CSP-safe) -->
  <link rel="stylesheet" href="/assets/vendor/leaflet.css?v=1">
  <link rel="stylesheet" href="/assets/vendor/markercluster.css?v=1">
  
  <!-- Project styles -->
  <link rel="stylesheet" href="/assets/styles.css?v=20251112">
</head>
<body>

  <link rel="preconnect" href="https://supm3n.com">
  
  <!-- Placeholder for shared site header -->
  <!--<header class="site-header"></header>-->
  {{HEADER_PLACEHOLDER}}

  <script src="https://supm3n.com/shared/scripts/components.js?v=20251110d" defer></script>

  <main class="page page--disasters">
    <section class="hero">
      <h1 class="page-title">Disaster Explorer</h1>
      <p class="page-subtitle">Recent earthquakes and wildfire hotspots</p>
    </section>

    <section class="controls">
      <div class="controls__row">
        <div class="search">
          <input id="searchBox" type="search" placeholder="Search place, hazard (e.g., 'earthquake'), or 'M≥5 last 24h'…">
          <button id="searchBtn" class="btn">Search</button>
        </div>
        <div class="chips">
          <label><input type="checkbox" class="chip" value="eq" checked> Earthquakes</label>
          <label><input type="checkbox" class="chip" value="wf" checked> Wildfires</label>
        </div>
        <div class="sort">
          <label for="sortSelect" class="sr-only">Sort</label>
          <select id="sortSelect" title="Sort events">
            <option value="recent" selected>Most recent</option>
            <option value="severe">Most severe</option>
          </select>
        </div>
        <div class="toggle">
          <label title="Show only official/scientific sources"><input type="checkbox" id="officialOnly"> Official sources only</label>
        </div>
      </div>
      <div class="status">
        <span id="statusText">Loading…</span>
        <span id="staleBadge" class="badge badge--hidden">Feed stale</span>
      </div>
    </section>

    <section class="content">
      <div id="map"></div>
      <aside id="list" aria-label="Events list"></aside>
    </section>
  </main>

  <!--<footer id="site-footer"></footer>-->
  {{FOOTER_PLACEHOLDER}}

  <!-- Leaflet & MarkerCluster JS from jsDelivr (allowed by CSP) -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Shared init & theme toggle -->
<script type="module">
  import { toggleTheme } from 'https://supm3n.com/shared/scripts/theme.js?v=20251110d';

  async function waitForComponents(timeoutMs = 5000) {
    const start = Date.now();
    while (!window.Supm3nComponents && Date.now() - start < timeoutMs) {
      await new Promise(r => setTimeout(r, 50));
    }
    return !!window.Supm3nComponents;
  }

  async function initHeader() {
    try {
      console.log('Waiting for Supm3nComponents...');
      const loaded = await waitForComponents();
      
      if (!loaded) {
        console.error('Supm3nComponents failed to load within timeout');
        const header = document.querySelector('.site-header');
        if (header) {
          header.innerHTML = `
            <div class="header-container">
              <a href="https://supm3n.com" class="logo">supm3n</a>
              <nav>
                <a href="https://supm3n.com/projects">Projects</a>
              </nav>
            </div>
          `;
          header.style.cssText = 'display:flex;justify-content:space-between;padding:1rem;border-bottom:1px solid #333;';
        }
        return;
      }

      console.log('Supm3nComponents loaded, initializing...');
      await window.Supm3nComponents.init({
        header: true,
        footer: false,
        styles: false,
        utils: false
      });
      console.log('Header initialized successfully');

      window.Supm3nUtils?.initNavigation?.();

      const themeToggle = document.getElementById('theme-toggle')
        || document.getElementById('themeToggle')
        || document.querySelector('[data-theme-toggle]');
      
      if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
        console.log('Theme toggle initialized');
      }
    } catch (error) {
      console.error('Error initializing header:', error);
      const header = document.querySelector('.site-header');
      if (header && !header.innerHTML.trim()) {
        header.innerHTML = '<div style="padding:1rem"><a href="https://supm3n.com">← Back to Home</a></div>';
      }
    }
  }

  initHeader();
</script>

<!-- App -->
<script type="module">
  // Import the shared theme module
  import { toggleTheme } from 'https://supm3n.com/shared/scripts/theme.js?v=20251110d';
    
  // Find the button (which now exists) and add the click listener
  (document.getElementById('theme-toggle')
    || document.getElementById('themeToggle')
    || document.querySelector('[data-theme-toggle]'))
    ?.addEventListener('click', toggleTheme);
</script>

  

</body>
</html>
